<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halaman Tidak Ditemukan — Jadwal KBM SMANSABA</title>
<meta name="theme-color" content="#1a4078">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,Arial,sans-serif;
    background:#f0f4f8;color:#1a202c;
    min-height:100vh;display:flex;flex-direction:column;
  }
  header{
    background:linear-gradient(to right,#1a4078,#2b63b3);
    color:#fff;padding:14px 20px;
    display:flex;align-items:center;gap:12px;
  }
  header h1{font-size:17px;font-weight:700}
  header p{font-size:12px;opacity:.8;margin-top:2px}
  main{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:32px 20px;text-align:center;
  }
  .card{
    background:#fff;border-radius:20px;
    padding:40px 32px;max-width:420px;width:100%;
    box-shadow:0 4px 24px rgba(0,0,0,.08);
  }
  .badge-404{
    display:inline-block;font-size:72px;font-weight:900;
    color:transparent;letter-spacing:-4px;
    background:linear-gradient(135deg,#1a4078,#2b63b3);
    -webkit-background-clip:text;background-clip:text;
    margin-bottom:8px;line-height:1;
  }
  .illustration{margin-bottom:20px}
  h2{font-size:20px;font-weight:700;color:#1a202c;margin-bottom:8px}
  p{font-size:14px;color:#718096;line-height:1.7;margin-bottom:24px}
  .path-hint{
    font-family:monospace;font-size:12px;
    background:#f1f5f9;color:#64748b;
    padding:6px 12px;border-radius:8px;
    margin-bottom:24px;display:inline-block;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .btn{
    display:block;width:100%;padding:13px;
    background:#1a4078;color:#fff;
    border:none;border-radius:12px;
    font-size:14px;font-weight:700;cursor:pointer;
    transition:background .2s,transform .1s;
    margin-bottom:10px;text-decoration:none;
  }
  .btn:hover{background:#163562}
  .btn:active{transform:scale(.98)}
  .btn-outline{
    background:transparent;color:#1a4078;
    border:2px solid #1a4078;
  }
  .btn-outline:hover{background:#eaf1fb}
  .divider{
    display:flex;align-items:center;gap:10px;
    color:#cbd5e1;font-size:12px;margin:4px 0 14px;
  }
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
  footer{
    text-align:center;padding:16px;
    font-size:12px;color:#94a3b8;
  }
  @media(prefers-color-scheme:dark){
    body{background:#0f172a;color:#e2e8f0}
    .card{background:#1e293b;box-shadow:0 4px 24px rgba(0,0,0,.3)}
    h2{color:#f1f5f9}
    p{color:#94a3b8}
    .path-hint{background:#0f172a;color:#64748b}
    .badge-404{background:linear-gradient(135deg,#3b82f6,#60a5fa);-webkit-background-clip:text;background-clip:text}
    .btn-outline{color:#93c5fd;border-color:#93c5fd}
    .btn-outline:hover{background:#1e3a5f}
    .divider{color:#334155}
    .divider::before,.divider::after{background:#334155}
    footer{color:#475569}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>📅 Jadwal KBM SMANSABA</h1>
    <p>SMA Negeri 1 Baturetno</p>
  </div>
</header>

<main>
  <div class="card">

    <div class="illustration">
      <!-- Ilustrasi SVG: kalender dengan tanda tanya -->
      <svg width="140" height="120" viewBox="0 0 140 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Kalender body -->
        <rect x="18" y="28" width="90" height="72" rx="10" fill="#e8f0fb" stroke="#2b63b3" stroke-width="1.5"/>
        <!-- Header kalender -->
        <rect x="18" y="28" width="90" height="26" rx="10" fill="#2b63b3"/>
        <rect x="18" y="44" width="90" height="10" fill="#2b63b3"/>
        <!-- Ring kalender -->
        <rect x="38" y="18" width="10" height="22" rx="5" fill="#1a4078"/>
        <rect x="78" y="18" width="10" height="22" rx="5" fill="#1a4078"/>
        <!-- Grid dots -->
        <circle cx="34" cy="70" r="3" fill="#cbd5e1"/>
        <circle cx="50" cy="70" r="3" fill="#cbd5e1"/>
        <circle cx="66" cy="70" r="3" fill="#cbd5e1"/>
        <circle cx="82" cy="70" r="3" fill="#cbd5e1"/>
        <circle cx="34" cy="85" r="3" fill="#cbd5e1"/>
        <circle cx="50" cy="85" r="3" fill="#cbd5e1"/>
        <circle cx="66" cy="85" r="3" fill="#cbd5e1"/>
        <!-- Tanda tanya besar -->
        <circle cx="112" cy="85" r="24" fill="#fff3e0" stroke="#f0a500" stroke-width="1.5"/>
        <text x="112" y="80" text-anchor="middle" font-size="16" font-weight="900" fill="#f0a500" font-family="Arial">?</text>
        <circle cx="112" cy="97" r="3" fill="#f0a500"/>
      </svg>
    </div>

    <div class="badge-404">404</div>
    <h2>Halaman Tidak Ditemukan</h2>
    <p>Halaman yang kamu cari tidak ada atau telah dipindahkan.</p>
    <div class="path-hint" id="pathHint">/halaman-tidak-dikenal</div>

    <a class="btn" href="/">🏠 Kembali ke Beranda</a>
    <div class="divider">atau</div>
    <a class="btn btn-outline" href="javascript:history.back()">← Kembali ke Halaman Sebelumnya</a>

  </div>
</main>

<footer>
  &copy; <span id="tahun"></span> SMA Negeri 1 Baturetno
</footer>

<script>
  // Tampilkan path yang dicari
  document.getElementById('pathHint').textContent = window.location.pathname || '/';
  document.getElementById('tahun').textContent = new Date().getFullYear();
</script>
</body>
</html>
